<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Mi CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/login.css') }}">
</head>

<body class="body">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <!-- <video src=" {{ url_for('static', filename = 'videos/videologin3.mp4') }} " autoplay loop muted class="videologin" type="VideoLogin.mp4"></video> -->

        <div class="card p-4 shadow-lg" style="width: 25rem;" id="custom">
            

                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename = 'img/logo.jpeg') }}" alt="LogoLogin" class="logo">
                    
                    <br>
                    
                    <h3 class="h3">Iniciar Sesion</h3>
                </div>

            <form action="{{ url_for('auth.login') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" id="alerta">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- Email Input -->
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electronico</label>
                    <input type="email" name="correo" class="form-control" id="email" placeholder="Correo@example.com" autocomplete="on" required>
                </div>

                <!-- Password Input -->
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="pwd" class="form-control" id="password" placeholder="Contraseña" required>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input">
                    <label for="rememberMe" class="form-check-label" id="rememberMe">Recuerdame</label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary w-100" id="button">
                    <strong>Acceder</strong>
                </button>

                <div class="mb-3">
                    <br>
                    
                </div>


            </form>

            <!-- Additional Links -->
            <div class="text-center mt-3" id="link-addi">
                <a href=" {{url_for('cambiar_contraseña.vista_recuperar')}} " class="text-decoration-none">Olvidaste tu contraseña?</a>
                <br>
                <span>No tienes cuenta? <a href=" {{ url_for('auth.registro') }} " class="text-decoration-none">Registrate</a></span>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    setTimeout(function() {
        const alertas = document.querySelectorAll('.alert');
        
        alertas.forEach(function(alerta) {
            alerta.style.display = 'none';
        });
    }, 3000); 
    </script>
    
</body>
</html>
