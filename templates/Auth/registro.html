<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .contenedor-formulario {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .header {
            display: flex;
            gap: 10px;
            margin-top: 0;
            color: #333;
            text-align: center;
            justify-content: center;
        }

        .header h2{
            margin-top: 0;
            line-height: 1.5;
        }

        .header img{
            border-radius: 100%;
        }
        .campo {
            margin-bottom: 15px;
        }

        .campo h4 strong{
            color: red;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: goldenrod;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="contenedor-formulario">
        <div class="header">
            <img id="img" width="35" height="35" src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="logo" class="rounded-circle me-2" style="object-fit: cover;">
            <h2>Unete a Nosotros</h2>
        </div>
        
        <form action=" {{ url_for('auth.registro') }} " method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ejemplo: Juan" required>
            </div>

            <div class="campo">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="campo">
                <label for="contrasena">Contraseña</label>
                <input type="password" id="contrasena" name="pwd" placeholder="Incluye caracteres alfanumericos y especiales ">
            </div>

            <div class="campo">
                <label for="pista">Pista de seguridad</label>
                <input type="text" id="pista" name="pista" placeholder="Usa una palabra secreta y no la compartas" required>
            </div>

            <div class="campo">
                <label for="edad">Edad</label>
                <input type="number" id="edad" name="edad" min="18" max="120" placeholder="Debes ser mayor de 18 para ingresar" required>
            </div>

            <div class="campo">
                <label for="sexo">Sexo:</label>
                <select id="sexo" name="sexo" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="femenino">Femenino</option>
                    <option value="masculino">Masculino</option>
                    <option value="otro">Otro</option>
                    <option value="prefiero_no_decirlo">Prefiero no decirlo</option>
                </select>
            </div>

            <div class="campo">
                <h4 style="text-align: center;"><strong class="Color">Importante</strong></h4>
                <p class="nota">
                    ¡Recuerda utilizar credenciales validas y reales, no compartas tus datos de seguridad con nadie!
                </p>
                <input type="submit" value="Registrarse">
            </div>

        </form>
    </div>

</body>
</html>
