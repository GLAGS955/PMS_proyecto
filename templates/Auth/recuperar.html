<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center; 
            height: 100vh;
            margin: 0;
        }
        .contenedor-formulario {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .paso {
            display: block; 
        }
        .oculto {
            display: none !important;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .error { color: red; font-size: 14px; display: none; margin-bottom: 10px;}

        .titulo-form {
            color: black;
            text-align: center;
            margin: 0;
            line-height: 35px; 
        }

        .cabezeras {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="contenedor-formulario">
                
        <form id="form-paso1" class="paso">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="cabezeras">
                <img width="35" height="35" src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="logo" class="rounded-circle" style="object-fit: cover;">
                <h2 class="titulo-form">Comencemos</h2>
            </div>
        
            <label for="correo">Ingresa tu correo</label>
            <input type="email" id="correo" placeholder="ejemplo@gmail.com" required>
            
            <p id="error-paso1" class="error">Usuario no encontrado.</p>
            <button type="submit">Enviar</button>
        </form>

        <form id="form-paso2" class="paso oculto">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="cabezeras">
                <img width="35" height="35" src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="logo" class="rounded-circle" style="object-fit: cover;">
                <h2 class="titulo-form">Paso 2: Seguridad</h2>
            </div>
        
            <label for="pista">Ingresa tu pista de seguridad</label>
            <input type="password" id="pista" required>
            
            <p id="error-paso2" class="error">Respuesta incorrecta.</p>
            <button type="submit">Validar Pista</button>
        </form>

        <form id="form-paso3" class="paso oculto">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
            <div class="cabezeras">
                <img width="35" height="35" src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="logo" class="rounded-circle" style="object-fit: cover;">
                <h2 class="titulo-form">Casi terminamos...</h2>
            </div>
        
            <label for="nueva-pass">Nueva contraseña</label>
            <input type="password" id="nueva-pass" required minlength="6">
            
            <label for="repetir-pass">Repite la contraseña</label>
            <input type="password" id="repetir-pass" required>
            
            <p id="error-paso3" class="error">Las contraseñas no coinciden.</p>
            <button type="submit">Cambiar Contraseña</button>
        </form>
    </div>

    <script>
    function getCSRFToken() {
        return document.querySelector('input[name="csrf_token"]').value;
    }

    // Paso 1
    document.getElementById('form-paso1').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        const correo = document.getElementById('correo').value; 
        
        try {
            let respuesta = await fetch('/api/validar-usuario', { 
                method: 'POST', 
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken() 
                },
                body: JSON.stringify({correo: correo}) 
            });

            if(respuesta.ok) { 
                document.getElementById('form-paso1').classList.add('oculto');
                document.getElementById('form-paso2').classList.remove('oculto');
                document.getElementById('error-paso1').style.display = 'none';
            } else { 
                document.getElementById('error-paso1').style.display = 'block';
            }
        } catch (error) {
            console.error("Error de conexión:", error);
        }
    });

    // Paso 2
    document.getElementById('form-paso2').addEventListener('submit', async function(e) {
        e.preventDefault();
        const pista = document.getElementById('pista').value;
        
        try {
            let respuesta = await fetch('/api/validar-pista', { 
                method: 'POST', 
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                },
                body: JSON.stringify({pista: pista}) 
            });

            if(respuesta.ok) { 
                document.getElementById('form-paso2').classList.add('oculto');
                document.getElementById('form-paso3').classList.remove('oculto');
                document.getElementById('error-paso2').style.display = 'none';
            } else { 
                document.getElementById('error-paso2').style.display = 'block';
            }
        } catch (error) {
            console.error("Error de conexión:", error);
        }
    });

    // Paso 3
    document.getElementById('form-paso3').addEventListener('submit', async function(e) {
        e.preventDefault();
        const pass1 = document.getElementById('nueva-pass').value;
        const pass2 = document.getElementById('repetir-pass').value;

        if (pass1 !== pass2) {
            document.getElementById('error-paso3').style.display = 'block';
            return;
        }

        try {
            let respuesta = await fetch('/api/cambiar-pwd', { 
                method: 'POST', 
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken()
                },
                body: JSON.stringify({nueva_pwd: pass1}) 
            });

            if(respuesta.ok) {
                document.getElementById('error-paso3').style.display = 'none';
                alert("¡Contraseña cambiada con éxito!");
                window.location.href = "/"; 
            } else {
                alert("Hubo un error al actualizar. Intenta de nuevo.");
            }
        } catch (error) {
            console.error("Error de conexión:", error);
        }
    });
    </script>

</body>
</html>
