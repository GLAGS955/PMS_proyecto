<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inicio{% endblock %}</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    
    {% block link %}
        <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    {% endblock %}
</head>
<body>
    
<main class="d-flex flex-nowrap vh-100">

    <div id="sidebar" class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark border-end border-secondary" style="width: 250px;">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <span class="fs-4 fw-bold">Menu</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto mt-2">
            <li class="nav-item"><a href="#" class="nav-link active">Inicio</a></li>
            <li><a href="#" class="nav-link text-white">Reservar</a></li>
            <li><a href="#" class="nav-link text-white"></a></li>
        </ul>
    </div>

    <div class="d-flex flex-column flex-grow-1 overflow-hidden">
        
        <header class="header navbar navbar-dark bg-dark border-bottom px-3 py-2 shadow-sm" style="z-index: 1050;">
            <div class="d-flex w-100 justify-content-between align-items-center">
                
                <div class="d-flex align-items-center">
                    <button class="btn btn-dark text-white me-3 border-0" id="btnToggleSidebar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                        </svg>
                    </button>

                    <div class="logo1 d-flex align-items-center">
                        <img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="Logo de la empresa" width="35" height="35" class="rounded-circle me-2" style="object-fit: cover;">
                        <span class="fs-4 text-white fw-bold mb-0">PMS</span>
                    </div>
                </div>

                <div class="d-flex align-items-center">
                    <img src="https://static.vecteezy.com/system/resources/previews/026/966/960/non_2x/default-avatar-profile-icon-of-social-media-user-vector.jpg" alt="fotoperfil" width="32" height="32" class="rounded-circle me-2">
            
                    <select class="form-select form-select-sm bg-dark text-white border-secondary fw-bold" 
                            style="cursor: pointer; width: auto;" 
                            onchange="if(this.value) window.location.href=this.value;">
                        <option value="" selected disabled> {{ session['nombre'] }} </option>
                        <option value=" {{url_for('acciones_usuarios.perfil_usuario')}} ">Perfil</option>
                        <option value="/ajustes">Editar</option>
                        <option value="{{ url_for('auth.cerrar_session') }}">Cerrar sesión</option>
                    </select>
                </div>

            </div>
        </header>

        <div class="flex-grow-1 p-4 bg-light overflow-y-auto">
            <div class="container-fluid h-100">
                
                
                <div class="card shadow-sm min-vh-50 h-100">
                    <div class="card-body d-flex justify-content-center align-items-center">
                        
                        {% block content %}
                        {% endblock %}
                        
                    </div>
                </div>

            </div>
        </div>

    </div>
</main>


<script>
    document.addEventListener("DOMContentLoaded", function() {
        const btnToggle = document.getElementById("btnToggleSidebar");
        const sidebar = document.getElementById("sidebar");

        btnToggle.addEventListener("click", function() {
            sidebar.classList.toggle("sidebar-hidden");
        });
    });
</script>

</body>
</html>
