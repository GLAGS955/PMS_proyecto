{% extends 'Inicios/sbar_admin.html'%}

{% block title %} Editar Cliente {% endblock %}

{% block link %}
    {{ super() }}
{% endblock %}

{% block content %}

<div class="container mt-4 mb-5" style="max-width: 800px;">
    
    <div class="mb-4 text-center">
        <h3 class="fw-bold text-dark m-3">Editar Cliente</h3>
    </div>

    <div class="card shadow-sm border-0 m-3" style="border-radius: 15px;">
        <div class="card-body p-4">
            
            <form action="{{ url_for('clientes.editar_cliente', id_exacto=id_cliente) }}" method="POST">
                
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label for="nombre" class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" class="form-control form-control-lg fs-6" id="nombre" name="nombre" 
                            value="{{ cliente.nombre }}" required>
                    </div>

                    <div class="col-md-6 mb-4">
                        <label for="cedula" class="form-label fw-bold">Número de Cédula</label>
                        <input type="text" class="form-control form-control-lg fs-6" id="cedula" name="cedula" 
                            value="{{ cliente.cedula }}" required>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-2 pt-3 border-top">
                    <a href="{{ url_for('clientes.listar_clientes') }}" class="btn btn-secondary px-4" style="border-radius: 10px;">
                        Cancelar
                    </a>
                    <button type="submit" class="btn px-4 fw-bold text-white" style="border-radius: 10px; background-color: goldenrod;">
                        Actualizar
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
